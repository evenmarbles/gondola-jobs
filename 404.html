<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const redirects = {
        "/job-benefits": "https://ventureoutdoorsflorida.com/job-benefits",
        "/leader-job-roles": "https://ventureoutdoorsflorida.com/leader-job-roles",
        "/leader-qualifications": "https://ventureoutdoorsflorida.com/leader-qualifications",
      };

      const path = window.location.pathname.replace(/\/$/, "");
      const target = redirects[path];

      if (target) {
        window.location.replace(target);
      } else {
        window.location.replace("https://ventureoutdoorsflorida.com/jobs");
      }
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
